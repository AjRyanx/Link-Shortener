<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkShortener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0a09;
      --surface: #1c1917;
      --surface-hover: #292524;
      --border: #44403c;
      --text: #e7e5e4;
      --text-muted: #a8a29e;
      --accent: #f59e0b;
      --accent-glow: rgba(245, 158, 11, 0.15);
      --radius: 10px;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'Sora', sans-serif;
    }

    .light {
      --bg: #fafaf9;
      --surface: #ffffff;
      --surface-hover: #f5f5f4;
      --border: #e7e5e4;
      --text: #1c1917;
      --text-muted: #78716c;
      --accent: #d97706;
      --accent-glow: rgba(217, 119, 6, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      max-width: 560px;
      margin: 0 auto;
    }

    .logo {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.125rem;
      letter-spacing: -0.02em;
    }
    .logo span { color: var(--accent); }

    .theme-toggle {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1.125rem;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .theme-toggle:hover {
      background: var(--surface-hover);
      color: var(--accent);
      border-color: var(--accent);
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.5rem 4rem;
      min-height: calc(100vh - 72px);
    }

    .tag {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-glow);
      padding: 0.375rem 0.875rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
      text-align: center;
      margin-bottom: 0.625rem;
    }
    h1 span { color: var(--accent); }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      text-align: center;
      margin-bottom: 2rem;
      max-width: 360px;
      line-height: 1.6;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 440px;
      transition: background 0.3s, border-color 0.3s;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    input[type="url"] {
      flex: 1;
      padding: 0.7rem 0.875rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="url"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    input[type="url"]::placeholder { color: var(--text-muted); }

    button {
      padding: 0.7rem 1.25rem;
      background: var(--accent);
      color: #0c0a09;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.875rem;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .result, .error {
      margin-top: 1rem;
      padding: 0.875rem;
      border-radius: var(--radius);
      display: none;
      word-break: break-all;
      font-size: 0.875rem;
    }
    .result.show, .error.show { display: block; }

    .result {
      background: var(--accent-glow);
      border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    }
    .result a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .result a:hover { text-decoration: underline; }
    .result .hint {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 0.375rem;
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #fca5a5;
    }

    .footer-meta {
      margin-top: 2.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .footer-meta a {
      color: var(--accent);
      text-decoration: none;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.875rem; }
      .card { padding: 1.25rem; }
      .input-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">/<span>s</span>hort</div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <span id="themeIcon">&#x263D;</span>
    </button>
  </nav>

  <main>
    <div class="tag">free &middot; open source</div>
    <h1>short links,<br><span>no fluff</span></h1>
    <p class="subtitle">Paste a monster URL and get a clean, shareable short link in seconds.</p>

    <div class="card">
      <form id="shortenForm">
        <div class="input-row">
          <input type="url" id="url" placeholder="https://example.com/very/long/url" required autofocus>
          <button type="submit" id="submitBtn">Shorten</button>
        </div>
      </form>
      <div class="result" id="result">
        <a id="shortUrl" href="#" target="_blank"></a>
        <div class="hint" id="shortCode"></div>
      </div>
      <div class="error" id="error"></div>
    </div>

    <p class="footer-meta">built with <a href="https://turso.tech" target="_blank">Turso</a> &middot; <a href="https://github.com/AjRyanx/Link-Shortener" target="_blank">GitHub</a></p>
  </main>

  <script>
    const form = document.getElementById('shortenForm');
    const urlInput = document.getElementById('url');
    const submitBtn = document.getElementById('submitBtn');
    const result = document.getElementById('result');
    const shortUrl = document.getElementById('shortUrl');
    const shortCode = document.getElementById('shortCode');
    const error = document.getElementById('error');
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');

    const html = document.documentElement;
    const stored = localStorage.getItem('theme');

    if (stored === 'light') {
      html.classList.remove('dark');
      html.classList.add('light');
      themeIcon.textContent = '\u2600';
    } else {
      html.classList.add('dark');
      html.classList.remove('light');
      themeIcon.textContent = '\u263D';
    }

    themeToggle.addEventListener('click', () => {
      const isDark = html.classList.contains('dark');
      html.classList.toggle('dark');
      html.classList.toggle('light');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
      themeIcon.textContent = isDark ? '\u2600' : '\u263D';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      error.classList.remove('show');
      result.classList.remove('show');
      submitBtn.disabled = true;

      try {
        const res = await fetch('/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: urlInput.value }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Something went wrong');
        shortUrl.textContent = data.shortUrl;
        shortUrl.href = data.shortUrl;
        shortCode.textContent = `code: ${data.shortCode}`;
        result.classList.add('show');
        urlInput.value = '';
      } catch (err) {
        error.textContent = err.message;
        error.classList.add('show');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
