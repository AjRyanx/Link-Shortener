<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkShortener</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #1e293b;
      padding: 2.5rem;
      border-radius: 12px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #f8fafc;
    }
    p.sub {
      color: #94a3b8;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
    }
    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #cbd5e1;
    }
    .input-group {
      display: flex;
      gap: 0.5rem;
    }
    input[type="url"] {
      flex: 1;
      padding: 0.625rem 0.875rem;
      border: 1px solid #334155;
      border-radius: 6px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="url"]:focus {
      border-color: #3b82f6;
    }
    button {
      padding: 0.625rem 1.25rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    button:hover { background: #2563eb; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .result {
      margin-top: 1.25rem;
      padding: 0.875rem;
      border-radius: 6px;
      background: #0f172a;
      display: none;
      word-break: break-all;
    }
    .result a {
      color: #60a5fa;
      text-decoration: none;
    }
    .result a:hover { text-decoration: underline; }
    .result.show { display: block; }
    .error {
      margin-top: 1.25rem;
      padding: 0.75rem;
      border-radius: 6px;
      background: #7f1d1d;
      color: #fca5a5;
      font-size: 0.875rem;
      display: none;
    }
    .error.show { display: block; }
    .shortcode { color: #94a3b8; font-size: 0.75rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>LinkShortener</h1>
    <p class="sub">Paste a long URL to get a short link</p>
    <form id="shortenForm">
      <label for="url">URL</label>
      <div class="input-group">
        <input type="url" id="url" placeholder="https://example.com/very/long/url" required>
        <button type="submit" id="submitBtn">Shorten</button>
      </div>
    </form>
    <div class="result" id="result">
      <a id="shortUrl" href="#" target="_blank"></a>
      <div class="shortcode" id="shortCode"></div>
    </div>
    <div class="error" id="error"></div>
  </div>
  <script>
    const form = document.getElementById('shortenForm');
    const urlInput = document.getElementById('url');
    const submitBtn = document.getElementById('submitBtn');
    const result = document.getElementById('result');
    const shortUrl = document.getElementById('shortUrl');
    const shortCode = document.getElementById('shortCode');
    const error = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      error.classList.remove('show');
      result.classList.remove('show');
      submitBtn.disabled = true;

      try {
        const res = await fetch('/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: urlInput.value }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Something went wrong');
        shortUrl.textContent = data.shortUrl;
        shortUrl.href = data.shortUrl;
        shortCode.textContent = `Code: ${data.shortCode}`;
        result.classList.add('show');
        urlInput.value = '';
      } catch (err) {
        error.textContent = err.message;
        error.classList.add('show');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
