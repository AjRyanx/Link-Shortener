<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; color: #333;
    }
    .container {
      background: #fff; border-radius: 12px; box-shadow: 0 2px 20px rgba(0,0,0,0.08);
      padding: 40px; width: 100%; max-width: 520px;
    }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p.sub { color: #666; margin-bottom: 24px; font-size: 14px; }
    .input-group { display: flex; gap: 8px; margin-bottom: 16px; }
    .input-group input {
      flex: 1; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px;
      font-size: 15px; outline: none; transition: border-color 0.2s;
    }
    .input-group input:focus { border-color: #4a90d9; }
    .input-group button {
      padding: 12px 24px; background: #4a90d9; color: #fff; border: none;
      border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 600;
      transition: background 0.2s; white-space: nowrap;
    }
    .input-group button:hover { background: #357abd; }
    .input-group button:disabled { background: #a0c4f0; cursor: not-allowed; }
    .result { display: none; padding: 16px; border-radius: 8px; margin-top: 16px; }
    .result.success { display: block; background: #e8f5e9; border: 1px solid #c8e6c9; }
    .result.error { display: block; background: #ffebee; border: 1px solid #ffcdd2; }
    .result a { color: #2e7d32; word-break: break-all; font-weight: 500; }
    .result .stat-link { display: inline-block; margin-top: 8px; font-size: 13px; color: #666; }
    .error-msg { color: #c62828; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>Link Shortener</h1>
    <p class="sub">Paste a long URL and get a short, shareable link</p>
    <div class="input-group">
      <input type="url" id="urlInput" placeholder="https://example.com/very/long/url" autofocus>
      <button id="shortenBtn">Shorten</button>
    </div>
    <div id="result" class="result"></div>
  </div>
  <script>
    const input = document.getElementById('urlInput');
    const btn = document.getElementById('shortenBtn');
    const result = document.getElementById('result');

    btn.addEventListener('click', async () => {
      const url = input.value.trim();
      if (!url) return;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      result.className = 'result';

      try {
        const res = await fetch('/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });
        const data = await res.json();

        if (!res.ok) {
          result.className = 'result error';
          result.innerHTML = `<span class="error-msg">${data.error}</span>`;
          return;
        }

        result.className = 'result success';
        result.innerHTML = `
          <div><a href="${data.shortUrl}" target="_blank">${data.shortUrl}</a></div>
          <a class="stat-link" href="/stats/${data.shortCode}" target="_blank">View stats</a>
        `;
        input.select();
      } catch {
        result.className = 'result error';
        result.innerHTML = '<span class="error-msg">Network error. Is the server running?</span>';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Shorten';
      }
    });

    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') btn.click(); });
  </script>
</body>
</html>
